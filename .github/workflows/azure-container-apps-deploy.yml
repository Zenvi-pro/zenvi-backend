name: Deploy zenvi-backend to Azure Container Apps

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  # ── Main Python backend ────────────────────────────────────────────────────
  deploy-backend:
    name: Backend (zenvi-backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Build & push
        env:
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/zenvi-backend:${{ github.sha }}
        run: |
          docker build --platform linux/amd64 -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy
        run: |
          az containerapp update \
            --name "${{ secrets.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "${{ env.IMAGE }}"

  # ── Remotion full-service renderer ────────────────────────────────────────
  deploy-remotion-full:
    name: Remotion full-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Build & push
        env:
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/remotion-full-service:${{ github.sha }}
        run: |
          docker build --platform linux/amd64 \
            -t "$IMAGE" \
            remotion-servers/full-service
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy
        run: |
          az containerapp update \
            --name "remotion-full-service" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "${{ env.IMAGE }}"

  # ── Remotion product-launch renderer ──────────────────────────────────────
  deploy-remotion-product-launch:
    name: Remotion product-launch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Build & push
        env:
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/remotion-product-launch:${{ github.sha }}
        run: |
          docker build --platform linux/amd64 \
            -t "$IMAGE" \
            remotion-servers/product-launch
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy
        run: |
          az containerapp update \
            --name "remotion-product-launch" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "${{ env.IMAGE }}"
